repos:
- repo: https://github.com/psf/black
  rev: 24.1.0
  hooks:
    - id: black
- repo: https://github.com/charliermarsh/ruff-pre-commit
  rev: v0.24.0
  hooks:
    - id: ruff
- repo: https://github.com/pre-commit/mirrors-prettier
  rev: v3.0.0
  hooks:
    - id: prettier
      files: "frontend/.*\.(js|ts|tsx|css|json)$"
